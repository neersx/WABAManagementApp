name: E2E (Playwright)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  e2e:
    runs-on: ubuntu-22.04
    timeout-minutes: 25

    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ ping: 1 })' --quiet"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      MONGO_URL: mongodb://localhost:27017
      DB_NAME: whatsapp_saas_ci
      JWT_SIGNING_KEY: ci-jwt-signing-key-not-for-production-do-not-use
      TOKEN_ENCRYPTION_KEY: 2TWZEtoa18npoPYmrWo2I-pSZwLFPvduWM_Oheafl80=
      META_APP_ID: "000000000000000"
      META_APP_SECRET: ci-mock-app-secret
      META_EMBEDDED_SIGNUP_CONFIG_ID: "000000000000000"
      META_WEBHOOK_VERIFY_TOKEN: ci-mock-verify-token
      META_GRAPH_API_VERSION: v21.0
      META_MOCK_MODE: "true"
      WORKER_ENABLED: "true"
      WORKER_POLL_INTERVAL_MS: "500"
      CORS_ORIGINS: "*"
      REACT_APP_BACKEND_URL: http://localhost:8001
      BASE_URL: http://localhost:3000

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: yarn
          cache-dependency-path: |
            frontend/yarn.lock
            e2e/yarn.lock

      - name: Install backend deps
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Install frontend deps
        working-directory: frontend
        run: yarn install --frozen-lockfile

      - name: Install e2e deps
        working-directory: e2e
        run: |
          yarn install --frozen-lockfile
          yarn install:browsers

      - name: Write backend .env
        working-directory: backend
        run: |
          cat > .env <<EOF
          MONGO_URL=$MONGO_URL
          DB_NAME=$DB_NAME
          CORS_ORIGINS=$CORS_ORIGINS
          JWT_SIGNING_KEY=$JWT_SIGNING_KEY
          TOKEN_ENCRYPTION_KEY=$TOKEN_ENCRYPTION_KEY
          META_APP_ID=$META_APP_ID
          META_APP_SECRET=$META_APP_SECRET
          META_EMBEDDED_SIGNUP_CONFIG_ID=$META_EMBEDDED_SIGNUP_CONFIG_ID
          META_WEBHOOK_VERIFY_TOKEN=$META_WEBHOOK_VERIFY_TOKEN
          META_GRAPH_API_VERSION=$META_GRAPH_API_VERSION
          META_MOCK_MODE=$META_MOCK_MODE
          WORKER_ENABLED=$WORKER_ENABLED
          WORKER_POLL_INTERVAL_MS=$WORKER_POLL_INTERVAL_MS
          EOF

      - name: Write frontend .env
        working-directory: frontend
        run: |
          cat > .env <<EOF
          REACT_APP_BACKEND_URL=$REACT_APP_BACKEND_URL
          WDS_SOCKET_PORT=0
          ENABLE_HEALTH_CHECK=false
          EOF

      - name: Start backend
        working-directory: backend
        run: |
          nohup uvicorn server:app --host 0.0.0.0 --port 8001 > backend.log 2>&1 &
          for i in {1..30}; do
            curl -fsS http://localhost:8001/api/health/ready && break || sleep 1
          done

      - name: Start frontend (CRA)
        working-directory: frontend
        env:
          CI: "true"
          BROWSER: none
        run: |
          nohup yarn start > frontend.log 2>&1 &
          for i in {1..60}; do
            curl -fsS http://localhost:3000 > /dev/null && break || sleep 2
          done

      - name: Run Playwright tests
        working-directory: e2e
        run: yarn test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report
          retention-days: 7

      - name: Upload logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: service-logs
          path: |
            backend/backend.log
            frontend/frontend.log
          retention-days: 7
